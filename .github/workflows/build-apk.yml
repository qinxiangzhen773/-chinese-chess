name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Android command-line tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          ls -la $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"
          sdkmanager --list_installed

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0" >> android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Download NNUE weight file
        run: |
          mkdir -p assets/nnue
          curl -L -o assets/nnue/pikafish.nnue \
            "https://github.com/official-pikafish/Networks/releases/download/master-net/pikafish.nnue"

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1

      - name: Test NDK compile (diagnostic)
        run: |
          NDK_BIN="$ANDROID_SDK_ROOT/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export PATH="$NDK_BIN:$PATH"
          CPP_DIR="android/app/src/main/cpp"
          PIKA="$CPP_DIR/pikafish/src"
          echo "=== Testing NDK toolchain ==="
          aarch64-linux-android21-clang++ --version
          echo "=== Compiling position.cpp ==="
          aarch64-linux-android21-clang++ -std=c++17 \
            -DIS_64BIT -DUSE_NEON -DNNUE_EMBEDDING_OFF -DNDEBUG \
            -fPIC -fPIE \
            -I "$CPP_DIR" \
            -I "$PIKA" \
            -I "$PIKA/nnue" \
            -I "$PIKA/nnue/features" \
            -I "$PIKA/nnue/layers" \
            -I "$PIKA/external" \
            -I "$PIKA/external/common" \
            -I "$PIKA/external/decompress" \
            -c "$PIKA/position.cpp" -o /tmp/position.o 2>&1
          echo "=== Compiling engine_wrapper.cpp ==="
          aarch64-linux-android21-clang++ -std=c++17 \
            -DIS_64BIT -DUSE_NEON -DNNUE_EMBEDDING_OFF -DNDEBUG \
            -fPIC -fPIE \
            -I "$CPP_DIR" \
            -I "$PIKA" \
            -I "$PIKA/nnue" \
            -I "$PIKA/nnue/features" \
            -I "$PIKA/nnue/layers" \
            -I "$PIKA/external" \
            -I "$PIKA/external/common" \
            -I "$PIKA/external/decompress" \
            -c "$CPP_DIR/engine_wrapper.cpp" -o /tmp/engine_wrapper.o 2>&1
          echo "=== Diagnostic complete ==="

      - name: Build release APK
        id: build_apk
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee build_output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "========================================"
          echo "=== CRITICAL: ERROR/WARNING EXTRACTION ==="
          echo "========================================"
          grep -n -i -E "error|FAILED|FAILURE|undefined reference|cannot find|not found|fatal|BUILD FAILED|compilation terminated|No such file|ninja: build stopped" build_output.log || echo "(no critical errors found in output)"
          echo "========================================"
          exit $BUILD_EXIT

      - name: Upload build failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: build_output.log
          retention-days: 7

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
